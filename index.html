<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offesa! 😤</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            text-align: center;
        }

        h1 { font-size: 3rem; margin-bottom: 10px; transition: 0.3s; }
        p { color: #888; margin-bottom: 30px; font-style: italic; }

        .btn {
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            background-color: #ff4757;
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
            transition: transform 0.1s;
            position: absolute;
            z-index: 100;
        }

        #run-btn { position: relative; }
    </style>
</head>
<body>

    <div id="ui">
        <h1 id="status">Mi sono offesa! 😤</h1>
        <p id="msg">Non provare a chiedermi scusa.</p>
        <button class="btn" id="run-btn" onmouseover="flee()">Chiedi scusa</button>
    </div>

    <script>
        // Funzione per generare il suono "pop" sintetico
        function playPopSound() {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, context.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, context.currentTime + 0.1);

            gain.gain.setValueAtTime(0.2, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.1);

            osc.connect(gain);
            gain.connect(context.destination);

            osc.start();
            osc.stop(context.currentTime + 0.1);
        }

        function flee() {
            const btn = document.getElementById('run-btn');
            
            // Suono
            playPopSound();

            // Movimento casuale
            const x = Math.random() * (window.innerWidth - btn.offsetWidth);
            const y = Math.random() * (window.innerHeight - btn.offsetHeight);
            
            btn.style.position = "absolute";
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
            
            // Messaggi randomici
            const messaggi = [
                "Scordatelo!", 
                "Troppo tardi!", 
                "Non ci provare.", 
                "Ti piacerebbe, eh?", 
                "Cerca di prendermi!", 
                "Ancora qui stai?"
            ];
            document.getElementById('msg').innerText = messaggi[Math.floor(Math.random() * messaggi.length)];
            
            // Un po' di "scuotimento" al titolo
            const status = document.getElementById('status');
            status.style.transform = `translateX(${Math.random() * 10 - 5}px)`;
        }

        // Se riescono a cliccarlo
        document.getElementById('run-btn').onclick = function() {
            document.getElementById('status').innerText = "Vabbè, pace. 🙄";
            document.getElementById('msg').innerText = "Ma che non succeda più!";
            this.style.display = "none";
        };
    </script>

</body>
</html>
